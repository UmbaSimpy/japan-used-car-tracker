name: Daily Price Scrape

on:
  schedule:
    - cron: '0 3 * * *'    # 12:00 Japan (JST, UTC+9)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to push freed_data.js back to repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Freed scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Run Noah scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python noah_scraper.py

      - name: Run StepWGN scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stepwgn_scraper.py

      - name: Run Voxy scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python voxy_scraper.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/freed_data.js data/noah_data.js data/stepwgn_data.js data/stepwgn_lowkm_data.js data/voxy_data.js
          git diff --cached --quiet || git commit -m "chore: daily price snapshot $(date +%Y-%m-%d)"
          git pull --rebase origin master
          git push
